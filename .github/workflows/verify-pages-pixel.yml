name: Rebuild and verify published page

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write

jobs:
  verify-page:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Request Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/request.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/kandousommelier/kaigo-case-library/pages/builds')
          echo "Request build HTTP status: ${code}"
          test "${code}" = '201' -o "${code}" = '409'

      - name: Wait for Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            response=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              'https://api.github.com/repos/kandousommelier/kaigo-case-library/pages/builds/latest')
            status=$(printf '%s' "${response}" | python -c "import json,sys; print(json.load(sys.stdin).get('status',''))")
            commit=$(printf '%s' "${response}" | python -c "import json,sys; print(json.load(sys.stdin).get('commit',''))")
            echo "Pages build status: ${status}; commit: ${commit}"
            if [ "${status}" = 'built' ] && [ "${commit}" = '888297685561210cc95d66eb2ea3f7afe7ae95c5' ]; then
              exit 0
            fi
            if [ "${status}" = 'errored' ]; then
              printf '%s\n' "${response}"
              exit 1
            fi
            sleep 15
          done
          exit 1

      - name: Check published HTML
        shell: bash
        run: |
          set -euo pipefail
          token="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          curl -fsSL -H 'Cache-Control: no-cache' \
            "https://kandousommelier.github.io/kaigo-case-library/?verify=${token}" \
            -o /tmp/index.html
          grep -Fq 'kaigo-case-library.goatcounter.com/count?p=/kaigo-case-library/' /tmp/index.html
          grep -Fq 'Cookieや外部JavaScriptは使用していません' /tmp/index.html
