name: Diagnose GitHub Pages

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: read

jobs:
  diagnose-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Read Pages configuration
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/kandousommelier/kaigo-case-library/pages' \
            -o /tmp/pages.json
          python - <<'PY'
          import json
          data = json.load(open('/tmp/pages.json'))
          print('html_url:', data.get('html_url'))
          print('status:', data.get('status'))
          print('build_type:', data.get('build_type'))
          print('source:', data.get('source'))
          PY

      - name: Read latest Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/kandousommelier/kaigo-case-library/pages/builds/latest' \
            -o /tmp/build.json
          python - <<'PY'
          import json
          data = json.load(open('/tmp/build.json'))
          print('status:', data.get('status'))
          print('commit:', data.get('commit'))
          print('created_at:', data.get('created_at'))
          print('updated_at:', data.get('updated_at'))
          print('error:', data.get('error'))
          PY
