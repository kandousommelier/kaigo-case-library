name: Verify published page

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: read

jobs:
  verify-page:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 32); do
            status=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              'https://api.github.com/repos/kandousommelier/kaigo-case-library/pages/builds/latest' \
              | python -c "import json,sys; print(json.load(sys.stdin).get('status',''))")
            echo "Pages build status: ${status}"
            if [ "${status}" = 'built' ]; then
              exit 0
            fi
            if [ "${status}" = 'errored' ]; then
              exit 1
            fi
            sleep 15
          done
          exit 1

      - name: Check published HTML
        shell: bash
        run: |
          set -euo pipefail
          token="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          curl -fsSL -H 'Cache-Control: no-cache' \
            "https://kandousommelier.github.io/kaigo-case-library/?verify=${token}" \
            -o /tmp/index.html
          grep -Fq 'kaigo-case-library.goatcounter.com/count?p=/kaigo-case-library/' /tmp/index.html
          grep -Fq 'Cookieや外部JavaScriptは使用していません' /tmp/index.html
