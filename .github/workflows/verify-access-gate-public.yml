name: Verify access gate deployment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Request Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/request.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/kandousommelier/kaigo-case-library/pages/builds')
          echo "Request build HTTP status: ${code}"
          test "${code}" = '201' -o "${code}" = '409'

      - name: Wait for deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 48); do
            response=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              'https://api.github.com/repos/kandousommelier/kaigo-case-library/pages/builds/latest')
            status=$(printf '%s' "${response}" | python -c "import json,sys; print(json.load(sys.stdin).get('status',''))")
            commit=$(printf '%s' "${response}" | python -c "import json,sys; print(json.load(sys.stdin).get('commit',''))")
            echo "Pages build status: ${status}; commit: ${commit}"
            if [ "${status}" = 'built' ] && [ "${commit}" = 'b36ce4adf75c982854767eacc63a90207151519d' ]; then
              exit 0
            fi
            if [ "${status}" = 'errored' ]; then
              exit 1
            fi
            sleep 15
          done
          exit 1

      - name: Verify published files
        run: |
          set -euo pipefail
          base='https://kandousommelier.github.io/kaigo-case-library'
          token="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          curl -fsSL -H 'Cache-Control: no-cache' "${base}/?verify=${token}" -o /tmp/index.html
          curl -fsSL -H 'Cache-Control: no-cache' "${base}/access-gate.js?verify=${token}" -o /tmp/access-gate.js
          curl -fsSL -H 'Cache-Control: no-cache' "${base}/fixes.css?verify=${token}" -o /tmp/fixes.css
          grep -Fq 'id="access-gate-template"' /tmp/index.html
          grep -Fq 'name="facility"' /tmp/index.html
          grep -Fq 'access-gate.js?v=20260705-access-gate' /tmp/index.html
          grep -Fq '施設コードを入力してください。' /tmp/access-gate.js
          grep -Fq 'html.access-locked' /tmp/fixes.css
          if grep -Fq '<img' /tmp/index.html && grep -Fq 'goatcounter.com/count' /tmp/index.html; then
            echo 'Static GoatCounter pixel remains in HTML.' >&2
            exit 1
          fi
